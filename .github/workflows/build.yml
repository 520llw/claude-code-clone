name: Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos-x64
          - macos-arm64
          - linux-x64
          - linux-arm64
          - windows-x64

env:
  NODE_VERSION: '18'

jobs:
  # Build npm package
  build-npm:
    name: Build npm Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Pack npm package
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: '*.tgz'
          retention-days: 30

  # Build binaries for macOS
  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'macos-x64' || github.event.inputs.target == 'macos-arm64' || github.event.inputs.target == null
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npx pkg . --targets node18-macos-${{ matrix.arch }} --output build/binaries/macos-${{ matrix.arch }}/claude-code-clone

      - name: Sign binary (if certificate available)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "" build.keychain
            security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-keychain-settings -t 3600 -u build.keychain
            security unlock-keychain -p "" build.keychain
            /usr/bin/codesign --force --options runtime --sign "Developer ID Application" build/binaries/macos-${{ matrix.arch }}/claude-code-clone
          fi
        continue-on-error: true

      - name: Create tar.gz
        run: |
          cd build/binaries/macos-${{ matrix.arch }}
          tar -czf ../../../claude-code-clone-${{ github.ref_name }}-macos-${{ matrix.arch }}.tar.gz claude-code-clone

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-binary
          path: '*.tar.gz'
          retention-days: 30

  # Build binaries for Linux
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'linux-x64' || github.event.inputs.target == 'linux-arm64' || github.event.inputs.target == null
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npx pkg . --targets node18-linux-${{ matrix.arch }} --output build/binaries/linux-${{ matrix.arch }}/claude-code-clone

      - name: Create tar.gz
        run: |
          cd build/binaries/linux-${{ matrix.arch }}
          tar -czf ../../../claude-code-clone-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz claude-code-clone

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-binary
          path: '*.tar.gz'
          retention-days: 30

  # Build binaries for Windows
  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'windows-x64' || github.event.inputs.target == null
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npx pkg . --targets node18-win-x64 --output build/binaries/win-x64/claude-code-clone.exe

      - name: Create zip
        run: |
          cd build/binaries/win-x64
          Compress-Archive -Path claude-code-clone.exe -DestinationPath ../../../claude-code-clone-${{ github.ref_name }}-win-x64.zip

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-binary
          path: '*.zip'
          retention-days: 30

  # Build Docker image
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/claude-code-clone
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate checksums
  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [build-npm, build-macos, build-linux, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.tgz" \) -exec sha256sum {} \; > ../checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

  # Create release draft
  release-draft:
    name: Create Release Draft
    runs-on: ubuntu-latest
    needs: [build-npm, build-macos, build-linux, build-windows, checksums]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
